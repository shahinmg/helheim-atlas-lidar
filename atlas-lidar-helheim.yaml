Name: Helheim ATLAS LiDAR
Description: The Autonomous Terrestrial Laser Scanning (ATLAS) systems are located along the margins of Helheim Glacier in Southeast Greenland. The ATLAS systems are unique, state-of-the-art, fully autonomous ground based Light Detection and Ranging (LiDAR) systems designed to collect long-range (10km) high-resolution point cloud data over the terminus region of the glacier every 6-hours (every 24-hours during winter months). These data were captured to better understand temporal glacier dynamics related to ice-ocean interactions and correlations to climate change. Data provided are geo-registered point clouds, derived glacier velocity models and surface elevation models. 
Contact: https://github.com/CRREL/helheim-atlas-lidar/issues
ManagedBy: US Army Corps of Engineers, Cold Regions Research & Engineering Laboratory
